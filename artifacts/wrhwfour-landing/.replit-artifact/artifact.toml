kind = "web"
previewPath = "/"
title = "WRHWFOUR Landing Page"
version = "1.0.0"
id = "artifacts/wrhwfour-landing"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19800

[services.development]
run = "pnpm --filter @workspace/wrhwfour-landing run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/wrhwfour-landing", "run", "build" ]
publicDir = "artifacts/wrhwfour-landing/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19800"
BASE_PATH = "/"
